VertexModelConfig:
  _target_: polygen.polygen_config.VertexModelConfig
  # 单卡训练用 auto，多卡再改 ddp
  accelerator: auto
  gpu_ids: [ 0 ]
  dataset_path: "/home/kemove/devdata1/ljr/dataset/Tallinn"
  batch_size: 12
  training_split: 0.80
  val_split: 0.10
  apply_random_shift: True
  decoder_config: { "hidden_size": 256, "fc_size": 1024, "num_layers": 18, "dropout_rate": 0.2 }
  quantization_bits: 8
  class_conditional: False
  num_classes: 55
  max_num_input_verts: 800
  use_discrete_embeddings: True
  learning_rate: 1e-4
  step_size: 5000
  gamma: 0.995
  training_steps: 150000
  image_model: False
  point_cloud_model: True
  num_input_points: 2048
  num_context_tokens: 256
  point_cloud_knn_scales: [ 8, 16, 32 ]
  geometric_loss_weight: 1000
  chamfer_max_points: 2048
  stop_loss_weight: 3.0
  length_loss_weight: 0.2
  length_loss_type: "huber"
  length_huber_delta: 10.0
  point_cloud_voxel_size: 0.01
  # Tallinn UTM coords: Y ~6.5e6, X ~5e5; must be > 6.6e6 to accept all points
  point_cloud_max_xyz_abs: 20000000.0
  point_cloud_max_retry: 20
  point_cloud_bad_sample_log_file: "bad_xyz_samples.log"
  # wandb 监控训练
  use_wandb: True
  wandb_project: "polygen-pointcloud"
  early_stopping_patience: 10
  early_stopping_min_delta: 0.0
  wandb_run_name: null # null 则自动生成
